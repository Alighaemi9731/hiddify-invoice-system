# Isolated staging stack for local/CI workflow checks.
# Usage:
#   cp deploy/.env.staging.example .env.staging
#   docker compose -p invoice-staging --env-file .env.staging \
#     -f deploy/docker-compose.staging.yml up -d --build
services:
  db:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invoice_staging}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.staging}
      POSTGRES_DB: ${POSTGRES_DB:-invoice_staging}
    volumes:
      - staging_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoice_staging} -d ${POSTGRES_DB:-invoice_staging}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ../backend
    restart: unless-stopped
    env_file: ../.env.staging
    environment:
      APP_ENV: staging
      POSTGRES_HOST: db
      RUN_SCHEDULER: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - staging_app_data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "127.0.0.1:${STAGING_PORT:-18080}:80"
    volumes:
      - ./Caddyfile.staging:/etc/caddy/Caddyfile:ro

volumes:
  staging_db_data:
  staging_app_data:
