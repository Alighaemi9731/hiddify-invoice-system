# Hiddify Reseller Invoicing System — local (Phase 1) stack.
# Usage:  cp .env.example .env  &&  edit .env  &&  docker compose up --build
#
# Services:
#   db        PostgreSQL 16
#   backend   FastAPI API + APScheduler (invoicing/dunning/sync)  -> http://localhost:8000
#   bot       aiogram v3 Telegram bot (long polling)
#   frontend  React SPA (RTL/Persian) served by nginx            -> http://localhost:5173

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invoice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoice}
      POSTGRES_DB: ${POSTGRES_DB:-invoice}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoice} -d ${POSTGRES_DB:-invoice}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      RUN_SCHEDULER: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000

  bot:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - app_data:/app/data
    command: >
      python -m app.bot.run

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:
  app_data:
