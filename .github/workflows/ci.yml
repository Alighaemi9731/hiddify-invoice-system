name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check app tests alembic
      - run: mypy app
      - run: pytest -q
      - name: Check Alembic migrations and model drift
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          db="$tmpdir/schema.db"
          DATABASE_URL="sqlite+aiosqlite:///$db" alembic upgrade head
          DATABASE_URL="sqlite+aiosqlite:///$db" alembic check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  deploy-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n deploy/install.sh deploy/bootstrap.sh deploy/updater.sh get.sh
      - name: Validate production Compose
        run: |
          printf 'POSTGRES_PASSWORD=ci-only-not-a-secret\n' > .env
          docker compose --env-file .env -f deploy/docker-compose.prod.yml config >/dev/null
      - name: Validate isolated staging Compose
        run: |
          cp deploy/.env.staging.example .env.staging
          docker compose --env-file .env.staging -f deploy/docker-compose.staging.yml config >/dev/null
