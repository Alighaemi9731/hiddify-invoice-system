name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.lock
      - run: pip install --require-hashes -r requirements-dev.lock
      - run: pip check
      - run: ruff check app tests alembic
      - run: mypy app
      - run: pytest -q
      - name: Check Alembic migrations and model drift
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          db="$tmpdir/schema.db"
          DATABASE_URL="sqlite+aiosqlite:///$db" alembic upgrade head
          DATABASE_URL="sqlite+aiosqlite:///$db" alembic check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build

  deploy-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - run: |
          bash -n deploy/install.sh deploy/bootstrap.sh deploy/updater.sh get.sh \
            deploy/package-release.sh deploy/release-installer.sh deploy/rollback.sh \
            deploy/smoke.sh deploy/test-release-tools.sh
      - run: bash deploy/test-release-tools.sh
      - name: Build and verify release assets
        run: |
          RELEASE_REF=HEAD bash deploy/package-release.sh "v$(cat VERSION)" /tmp/release
          cd /tmp/release
          sha256sum -c "invoice-system-v$(cat "$GITHUB_WORKSPACE/VERSION").tar.gz.sha256"
          sha256sum -c release-installer.sh.sha256
      - name: Validate production Compose
        run: |
          printf 'POSTGRES_PASSWORD=ci-only-not-a-secret\n' > .env
          docker compose --env-file .env -f deploy/docker-compose.prod.yml config >/dev/null
      - name: Validate isolated staging Compose
        run: |
          cp deploy/.env.staging.example .env.staging
          docker compose --env-file .env.staging -f deploy/docker-compose.staging.yml config >/dev/null
