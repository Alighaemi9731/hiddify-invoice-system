[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "W", "I", "UP", "B904"]
ignore = ["UP017", "UP042"]

[tool.ruff.lint.per-file-ignores]
"tests/*.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.mypy]
python_version = "3.12"
files = ["app"]
check_untyped_defs = true
no_implicit_optional = true
show_error_codes = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = [
    "apscheduler.*",
    "arabic_reshaper",
    "bidi.*",
    "reportlab.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["app.bot.handlers"]
# Aiogram callback/message properties remain optional in its stubs after router filters.
disable_error_code = ["arg-type", "index", "union-attr"]
