server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|svg|png|jpg)$ {
        expires 7d;
        access_log off;
    }
}
