server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets (JS/CSS/fonts/images) — the filename changes on every rebuild, so they're
    # safe to cache for a long time. MUST come before the SPA fallback so a missing asset 404s
    # instead of returning index.html.
    location ~* \.(js|css|woff2?|svg|png|jpg|ico)$ {
        expires 7d;
        access_log off;
    }

    # SPA fallback — every route resolves to index.html. index.html itself must NEVER be cached,
    # otherwise a browser keeps loading the OLD hashed bundle it references after a new deploy.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
}
