server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The service worker + its registration must NEVER be cached, or a new deploy's SW
    # (and the precache it points at) won't be picked up. Exact-match wins over the regex below.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # Hashed assets (JS/CSS/fonts/images) — the filename changes on every rebuild, so they're
    # safe to cache for a long time. MUST come before the SPA fallback so a missing asset 404s
    # instead of returning index.html.
    location ~* \.(js|css|woff2?|svg|png|jpg|ico)$ {
        # filenames are content-hashed → safe to cache hard + immutable (no revalidation)
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    # SPA fallback — every route resolves to index.html. index.html itself must NEVER be cached,
    # otherwise a browser keeps loading the OLD hashed bundle it references after a new deploy.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
}
